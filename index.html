<!DOCTYPE html>
<html lang="hu">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Parfüm Webáruház - Ponauer Maja</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js"></script>
    <script type="module" src="main.js"></script>
</head>
<body class="bg-light">

    <nav class="navbar navbar-dark bg-dark">
        <div class="container">
            <span class="navbar-brand mb-0 h1">Parfüm Webáruház</span>
        </div>
    </nav>

    <div class="container py-4">

        <div class="text-center mb-4">
            <h1 class="display-5">Parfüm Webáruház</h1>
            <p class="text-muted">Női, férfi és uniszex illatok</p>
        </div>

        <div class="card mb-4 shadow-sm">
            <div class="card-body">
                <div class="row g-3">

                    <div class="col-md-4">
                        <input 
                            type="text" 
                            id="keresoMezo" 
                            class="form-control" 
                            placeholder="Keresés terméknév szerint..."
                        >
                    </div>

                    <div class="col-md-3">
                        <select id="kategoriaValaszto" class="form-select">
                            <option value="osszes">Összes kategória</option>
                            <option value="Női">Női</option>
                            <option value="Férfi">Férfi</option>
                            <option value="Uniszex">Uniszex</option>
                        </select>
                    </div>

                    <div class="col-md-5 text-md-end">
                        <button id="termekekGomb" class="btn btn-primary me-2">
                            Termékek
                        </button>
                        <button id="kosarGomb" class="btn btn-success">
                            Kosár (<span id="kosarDarab">0</span>)
                        </button>
                    </div>

                </div>
            </div>
        </div>

        <div id="tartalom" class="row g-4"></div>

    </div>

</body>
</html>
